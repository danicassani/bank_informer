<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Importador bancario</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js" defer></script>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .card {
        background: rgba(15, 23, 42, 0.9);
        border-radius: 18px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.45);
        width: min(640px, 100%);
        padding: 2.5rem;
      }

      h1 {
        margin: 0 0 1.5rem;
        font-size: 2rem;
        font-weight: 700;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }

      input[type="text"],
      input[type="file"] {
        width: 100%;
        font: inherit;
        padding: 0.65rem 0.75rem;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.75);
        color: inherit;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input[type="text"]:focus,
      input[type="file"]:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        border: none;
        border-radius: 999px;
        color: #0f172a;
        cursor: pointer;
        font-weight: 700;
        font-size: 1rem;
        padding: 0.85rem 1.75rem;
        margin-top: 1.5rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      }

      button:hover:not([disabled]) {
        transform: translateY(-1px);
        box-shadow: 0 18px 35px rgba(56, 189, 248, 0.35);
      }

      button[disabled] {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .message {
        margin-top: 1.5rem;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        font-weight: 600;
      }

      .message.success {
        background: rgba(34, 197, 94, 0.2);
        border: 1px solid rgba(34, 197, 94, 0.4);
        color: #bbf7d0;
      }

      .message.error {
        background: rgba(239, 68, 68, 0.2);
        border: 1px solid rgba(239, 68, 68, 0.4);
        color: #fecaca;
      }

      .result {
        margin-top: 1.25rem;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        background: rgba(148, 163, 184, 0.12);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }

      .result dt {
        font-weight: 600;
      }

      .result dd {
        margin: 0 0 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="card">
        <h1>Importador de movimientos bancarios</h1>
        <p>
          Sube un CSV exportado de tu banco con las columnas <strong>Concepto</strong>,
          <strong>Fecha</strong>, <strong>Importe</strong> y <strong>Saldo disponible</strong>.
        </p>

        <form @submit.prevent="submitForm" novalidate>
          <div class="form-group">
            <label for="source-name">Nombre de la importación</label>
            <input
              id="source-name"
              type="text"
              v-model="sourceName"
              placeholder="Cuenta corriente principal"
              autocomplete="off"
              required
            />
          </div>

          <div class="form-group">
            <label for="csv-file">Archivo CSV</label>
            <input
              id="csv-file"
              type="file"
              accept=".csv,text/csv"
              @change="onFileChange"
              ref="fileInput"
              required
            />
          </div>

          <button type="submit" :disabled="isSubmitting || !file">
            <span v-if="isSubmitting">Procesando…</span>
            <span v-else>Subir CSV</span>
          </button>
        </form>

        <div v-if="message" class="message" :class="messageType">
          {{ message }}
        </div>

        <dl v-if="result" class="result">
          <div>
            <dt>Importación</dt>
            <dd>#{{ result.statement_id }} · {{ result.file_name }}</dd>
          </div>
          <div>
            <dt>Movimientos creados</dt>
            <dd>{{ result.transactions_created }}</dd>
          </div>
        </dl>
      </div>
    </div>

    <script defer>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            sourceName: "",
            file: null,
            isSubmitting: false,
            message: "",
            messageType: "success",
            result: null,
          };
        },
        computed: {
          csrfToken() {
            const match = document.cookie.match(/csrftoken=([^;]+)/);
            return match ? decodeURIComponent(match[1]) : "";
          },
        },
        methods: {
          onFileChange(event) {
            const [file] = event.target.files;
            this.file = file || null;
            this.result = null;
            this.message = "";
          },
          async submitForm() {
            if (!this.file) {
              this.message = "Selecciona un archivo CSV antes de continuar.";
              this.messageType = "error";
              return;
            }

            this.isSubmitting = true;
            this.message = "";
            this.messageType = "success";

            const formData = new FormData();
            formData.append("source_name", this.sourceName.trim());
            formData.append("file", this.file);

            try {
              const response = await fetch("{% url 'upload_statement' %}", {
                method: "POST",
                headers: {
                  "X-CSRFToken": this.csrfToken,
                },
                body: formData,
              });

              const payload = await response.json();

              if (!response.ok) {
                throw new Error(payload.error || "No se ha podido completar la importación.");
              }

              this.message = "Importación realizada correctamente.";
              this.messageType = "success";
              this.result = payload;
              this.sourceName = "";
              this.file = null;
              this.$refs.fileInput.value = "";
            } catch (error) {
              this.message = error.message;
              this.messageType = "error";
            } finally {
              this.isSubmitting = false;
            }
          },
        },
        mounted() {
          if (!this.sourceName) {
            this.sourceName = "Importación manual";
          }
        },
      }).mount("#app");
    </script>
  </body>
</html>
